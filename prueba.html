<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Etiqueta Caja Menudo</title>

<style>
  body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#fff;
  }

  .etiqueta{
    width: 18cm;
    height: 12cm;
    border: 3px solid #000;
    padding: 20px;
    box-sizing: border-box;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
  }

  .header{
    text-align:center;
  }

  .logo{
    max-height:80px;
    margin-bottom:10px;
  }

  .empresa{
    font-size:28px;
    font-weight:bold;
  }

  .producto{
    text-align:center;
    margin-top:10px;
  }

  .producto h1{
    font-size:38px;
    margin:0;
  }

  .producto h2{
    font-size:26px;
    margin:0;
  }

  .info{
    margin-top:15px;
    font-size:22px;
  }

  .info div{
    margin:5px 0;
  }

  .footer{
    font-size:18px;
    text-align:center;
    margin-top:10px;
  }

  .barra{
    height:10px;
    background:#0a7a3b;
    margin-top:10px;
  }

  @media print {
    body{
      margin:0;
    }
  }
</style>
</head>

<body>

<div class="etiqueta">

  <div class="header">
    <!-- CAMBIA ESTE SRC POR TU LOGO -->
    <img src="TU_LOGO_AQUI.png" class="logo">
    <div class="empresa">CARNES Y VÍSCERAS DEL CENTRO</div>
  </div>

  <div class="producto">
    <h1>CAJA DE MENUDO</h1>
    <h2>VÍSCERAS DEL CENTRO</h2>
  </div>

  <div class="info">
    <div><strong>PESO NETO:</strong> 20 KG</div>
    <div><strong>FECHA:</strong> <span id="fecha"></span></div>
    <div><strong>LOTE:</strong> __________________</div>
    <div><strong>CONSERVAR:</strong> CONGELADO ❄️</div>
    <div><strong>COD:</strong> VDC-MEN-001</div>
  </div>

  <div class="footer">
    ✔ Calidad garantizada &nbsp;&nbsp; ✔ Producto seleccionado &nbsp;&nbsp; ✔ Venta mayorista
  </div>

  <div class="barra"></div>

</div>

<script>
  const hoy = new Date();
  const fechaFormateada = hoy.toLocaleDateString('es-MX');
  document.getElementById("fecha").textContent = fechaFormateada;
</script>

</body>
</html>
