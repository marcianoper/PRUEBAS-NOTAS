<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Etiqueta Menudo 200x80mm</title>

<style>
  @page{
    size: 200mm 80mm;
    margin: 0;
  }

  *{
    box-sizing:border-box;
  }

  html, body{
    margin:0;
    padding:0;
    width:200mm;
    height:80mm;
    background:#fff;
    font-family: Arial, Helvetica, sans-serif;
  }

  .etiqueta{
    width:200mm;
    height:80mm;
    padding:6mm 8mm;
    border:2px solid #000;
    display:grid;
    grid-template-columns: 58mm 1fr 55mm;
    gap:6mm;
    overflow:hidden;
  }

  .bloque-logo{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
  }

  .logo{
    max-width:42mm;
    max-height:24mm;
    object-fit:contain;
    margin-bottom:3mm;
  }

  .empresa{
    font-size:13px;
    font-weight:900;
    text-transform:uppercase;
    line-height:1.15;
  }

  .producto{
    display:flex;
    flex-direction:column;
    justify-content:center;
    text-align:center;
    border-left:2px solid #000;
    border-right:2px solid #000;
    padding:0 6mm;
  }

  .producto h1{
    margin:0;
    font-size:31px;
    line-height:1;
    font-weight:900;
    letter-spacing:.5px;
  }

  .producto h2{
    margin:4mm 0 0;
    font-size:20px;
    line-height:1;
    font-weight:900;
  }

  .info{
    display:flex;
    flex-direction:column;
    justify-content:center;
    font-size:15px;
    line-height:1.45;
    font-weight:700;
  }

  .peso{
    font-size:24px;
    font-weight:900;
    margin-bottom:2mm;
  }

  .lote{
    margin-top:1mm;
  }

  .congelado{
    margin-top:2mm;
    border-top:1px dashed #000;
    padding-top:2mm;
    font-size:13px;
  }

  .footer{
    position:absolute;
    left:8mm;
    bottom:3mm;
    font-size:10px;
    font-weight:700;
  }

  @media print{
    html, body{
      width:200mm;
      height:80mm;
      overflow:hidden;
    }

    .etiqueta{
      page-break-after:avoid;
      page-break-inside:avoid;
    }
  }
</style>
</head>

<body>

<div class="etiqueta">
  <div class="bloque-logo">
    <img src="TU_LOGO_AQUI.png" class="logo">
    <div class="empresa">Carnes y Vísceras del Centro</div>
  </div>

  <div class="producto">
    <h1>CAJA DE MENUDO</h1>
    <h2>VÍSCERAS DEL CENTRO</h2>
  </div>

  <div class="info">
    <div class="peso">20 KG</div>
    <div><strong>FECHA:</strong> <span id="fecha"></span></div>
    <div class="lote"><strong>LOTE:</strong> __________</div>
    <div><strong>COD:</strong> VDC-MEN-001</div>
    <div class="congelado"><strong>CONSERVAR CONGELADO</strong></div>
  </div>
</div>

<script>
  const hoy = new Date();
  document.getElementById("fecha").textContent =
    hoy.toLocaleDateString("es-MX");
</script>

</body>
</html>
