<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Etiqueta Menudo 80mm</title>

<style>
  body{
    margin:0;
    font-family: monospace;
  }

  .ticket{
    width:80mm;
    height:200mm;
    padding:8px;
    box-sizing:border-box;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
  }

  .center{
    text-align:center;
  }

  .logo{
    max-width:100%;
    max-height:60px;
    object-fit:contain;
    margin-bottom:5px;
  }

  .empresa{
    font-size:14px;
    font-weight:bold;
  }

  .producto{
    margin-top:8px;
  }

  .producto h1{
    font-size:20px;
    margin:0;
  }

  .producto h2{
    font-size:16px;
    margin:0;
  }

  .info{
    font-size:14px;
    margin-top:10px;
  }

  .line{
    border-top:1px dashed #000;
    margin:6px 0;
  }

  .footer{
    font-size:12px;
    text-align:center;
  }

  @media print {
    body{
      margin:0;
    }
  }
</style>

</head>

<body>

<div class="ticket">

  <div class="center">
    <img src="TU_LOGO_AQUI.png" class="logo">
    <div class="empresa">CARNES Y VÍSCERAS DEL CENTRO</div>
  </div>

  <div class="producto center">
    <h1>CAJA DE MENUDO</h1>
    <h2>VÍSCERAS DEL CENTRO</h2>
  </div>

  <div class="info">
    <div class="line"></div>

    <div><strong>PESO:</strong> 20 KG</div>
    <div><strong>FECHA:</strong> <span id="fecha"></span></div>
    <div><strong>LOTE:</strong> __________</div>
    <div><strong>CONSERVAR:</strong> CONGELADO</div>
    <div><strong>COD:</strong> VDC-MEN-001</div>

    <div class="line"></div>
  </div>

  <div class="footer">
    ✔ Calidad garantizada <br>
    ✔ Producto seleccionado <br>
    ✔ Venta mayorista
  </div>

</div>

<script>
  const hoy = new Date();
  const fecha = hoy.toLocaleDateString('es-MX');
  document.getElementById("fecha").textContent = fecha;
</script>

</body>
</html>
